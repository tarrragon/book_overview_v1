# sync-skills.yaml - 選擇性 skill 同步設定
#
# mode: all | select | none
#   all    - 同步全部 skills（預設，無此檔案時的行為）
#   select - 只同步 include 清單中的 skills
#   none   - 不同步任何 skill
#
# include: (mode: select 時生效)
#   列出要同步的 skill 目錄名
#
# private: (任何 mode 下都排除推送)
#   列出不推送到共享框架 repo 的 skill 目錄名
#   pull 時這些 skill 也不會被覆蓋

mode: all
