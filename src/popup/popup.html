<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Readmoo 書庫提取器</title>
  <link rel="stylesheet" href="../core/design-system/design-system.css">
  <style>
    body {
      width: 350px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--color-background);
      color: var(--color-on-background);
    }

    .header {
      background: var(--color-surface);
      padding: var(--spacing-lg);
      text-align: center;
      box-shadow: 0 2px 10px var(--shadow-color-sm);
    }

    .header h1 {
      margin: 0;
      font-size: var(--font-size-title-medium);
      color: var(--color-on-background);
      font-weight: var(--font-weight-semi-bold);
    }

    .header p {
      margin: var(--spacing-xs) 0 0 0;
      font-size: var(--font-size-caption);
      color: var(--color-on-surface-muted);
    }

    .content {
      padding: var(--spacing-lg);
    }

    /* 卡片權重三級：次階 panel 為預設（狀態 / 進度 / 結果 / 頁面資訊卡） */
    .status-card {
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }

    /* 主階 primary surface：主操作卡升 surface 白底 + sm shadow，成為視覺重心 */
    .status-card.primary-surface {
      background: var(--color-surface);
      border: none;
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      box-shadow: 0 2px 8px var(--shadow-color-sm);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
    }
    
    .status-dot {
      width: var(--spacing-sm);
      height: var(--spacing-sm);
      border-radius: 50%;
      background: var(--color-success);
    }

    .status-dot.loading {
      background: var(--color-warning);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-dot.error {
      background: var(--color-error);
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* 按鈕主次三級：radius 去 pill（sm 8px，對齊資料工具類別） */
    .button {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      border: none;
      border-radius: var(--radius-sm);
      font-size: var(--font-size-body-large);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: var(--spacing-sm);
    }

    .button.primary {
      background: var(--color-primary);
      color: var(--color-surface);
      font-weight: var(--font-weight-semi-bold);
    }

    .button.primary:hover {
      background: var(--color-primary-dark);
    }

    .button.secondary {
      background: var(--color-panel);
      color: var(--color-on-background);
      border: 1px solid var(--color-border);
      font-size: var(--font-size-body-medium);
    }

    .button.secondary:hover {
      background: var(--color-primary-lightest);
    }

    .button.danger {
      background: var(--color-error);
      color: var(--color-surface);
    }

    .button.danger:hover {
      background: var(--color-error);
      opacity: 0.9;
    }

    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .info-text {
      font-size: var(--font-size-caption);
      color: var(--color-on-surface-muted);
      line-height: 1.5;
    }

    .version {
      text-align: center;
      font-size: var(--font-size-caption);
      color: var(--color-on-surface-muted);
      margin-top: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
    }

    /* 進度 / 結果 / 錯誤區段標題（區塊標題層級：body 字級 + 半粗） */
    .progress-header, .results-header, .error-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-sm);
    }

    .progress-header strong, .results-header strong, .error-header strong {
      font-size: var(--font-size-body-medium);
      color: var(--color-on-background);
      font-weight: var(--font-weight-semi-bold);
    }

    .progress-percentage {
      font-size: var(--font-size-body-medium);
      color: var(--color-on-background);
      font-weight: var(--font-weight-semi-bold);
    }

    .progress-bar-container {
      height: var(--spacing-sm);
      background-color: var(--color-border);
      border-radius: var(--radius-xs);
      overflow: hidden;
      margin-bottom: var(--spacing-sm);
    }

    .progress-bar {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-xs);
      transition: width 0.3s ease-in-out;
    }

    .progress-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-xs);
      transition: width 0.3s ease-in-out;
    }

    .action-buttons {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }

    .button.small {
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: var(--font-size-caption);
    }

    .error-card {
      background-color: var(--color-error-light);
      border: 1px solid var(--color-error-light);
      color: var(--color-error);
    }

    .error-message {
      font-size: var(--font-size-caption);
      color: var(--color-error);
      line-height: 1.5;
      margin-bottom: var(--spacing-md);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Readmoo 書庫提取器</h1>
    <p>專業書目管理工具</p>
  </div>
  
  <div class="content">
    <!-- 狀態顯示 -->
    <div class="status-card">
      <div class="status-indicator">
        <div class="status-dot loading" id="statusDot"></div>
        <span id="statusText">正在檢查狀態...</span>
      </div>
      <div class="info-text" id="statusInfo">
        請稍候，正在初始化擴展功能
      </div>
    </div>
    
    <!-- 主要操作按鈕（主階卡片：視覺重心） -->
    <div class="status-card primary-surface">
      <button class="button primary" id="extractBtn" disabled>
        開始提取書庫資料
      </button>

      <button class="button secondary" id="settingsBtn">
        擴展設定
      </button>

      <button class="button secondary" id="helpBtn">
        使用說明
      </button>

      <button class="button secondary" id="viewLibraryBtn" aria-label="開啟書庫總覽頁面檢視所有書籍">
        檢視書庫
      </button>

      <button class="button secondary" id="importBtn" aria-label="從 JSON 檔案匯入書庫資料">
        匯入書庫
      </button>
      <input type="file" id="importFileInput" accept=".json" style="display: none;" aria-hidden="true">

      <button class="button secondary" id="diagnosticBtn" style="display: none;">
        診斷模式
      </button>
    </div>
    
    <!-- 進度顯示區域 -->
    <div class="status-card" id="progressContainer" style="display: none;">
      <div class="progress-header">
        <strong>提取進度</strong>
        <span id="progressPercentage">0%</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill"></div>
        </div>
      </div>
      <div class="info-text" id="progressText">
        準備開始提取...
      </div>
    </div>
    
    <!-- 結果展示區域 -->
    <div class="status-card" id="resultsContainer" style="display: none;">
      <div class="results-header">
        <strong>提取結果</strong>
      </div>
      <div class="info-text">
        <strong>已提取書籍:</strong> <span id="extractedBookCount">0</span> 本<br>
        <strong>提取時間:</strong> <span id="extractionTime">-</span><br>
        <strong>成功率:</strong> <span id="successRate">-</span>
      </div>
      <div class="action-buttons">
        <button class="button secondary small" id="exportBtn" disabled>
          匯出資料
        </button>
        <button class="button secondary small" id="viewResultsBtn" disabled aria-label="查看詳細的提取結果">
          查看結果
        </button>
      </div>
    </div>

    <!-- 匯入結果展示區域 -->
    <div class="status-card" id="importResultContainer" style="display: none;">
      <div class="results-header">
        <strong>匯入結果</strong>
      </div>
      <div class="info-text">
        <strong>新增:</strong> <span id="importedCount">0</span> 本<br>
        <strong>更新:</strong> <span id="updatedCount">0</span> 本<br>
        <strong>未變更:</strong> <span id="unchangedCount">0</span> 本
      </div>
      <div class="action-buttons">
        <button class="button secondary small" id="closeImportResultBtn" aria-label="關閉匯入結果">
          關閉
        </button>
      </div>
    </div>

    <!-- 系統初始載入錯誤 -->
    <div class="status-card error-card" id="initErrorContainer" style="display: none;">
      <div class="error-header">
        <strong>系統初始化失敗</strong>
      </div>
      <div class="error-message" id="initErrorMessage">
        擴展初始化過程中發生錯誤
      </div>
      <div class="action-buttons">
        <button class="button primary small" id="forceReloadBtn">
          強制重新載入擴展
        </button>
        <button class="button secondary small" id="openExtensionPageBtn">
          開啟擴展管理頁面
        </button>
      </div>
    </div>

    <!-- 錯誤訊息區域（按鈕收斂為 1 primary 重試 + 1 secondary 重新載入） -->
    <div class="status-card error-card" id="errorContainer" style="display: none;">
      <div class="error-header">
        <strong>錯誤訊息</strong>
      </div>
      <div class="error-message" id="errorMessage">
        發生未知錯誤
      </div>
      <div class="action-buttons">
        <button class="button primary small" id="retryBtn">
          重試
        </button>
        <button class="button secondary small" id="reloadExtensionBtn">
          重新載入擴展
        </button>
      </div>
      <div class="error-suggestions" id="errorSuggestions" style="display: none;">
        <div class="info-text">
          <strong>建議解決步驟：</strong>
          <ol id="suggestionsList"></ol>
        </div>
      </div>
    </div>
    
    <!-- 頁面信息 -->
    <div class="status-card">
      <div class="info-text">
        <strong>當前頁面:</strong> <span id="pageInfo">檢測中...</span><br>
        <strong>檢測到書籍:</strong> <span id="bookCount">-</span><br>
        <strong>擴展狀態:</strong> <span id="extensionStatus">-</span>
      </div>
    </div>
  </div>
  
  <div class="version" id="versionDisplay">
    載入中...
  </div>
  
  <!--
    W4-006.2 重構（合併 popup 4 檔為單一 entry，esbuild 自動 bundle）：

    原本 popup-error-handler.js / popup-diagnostic-enhancer.js /
    popup-initialization-tracker.js 三檔以獨立 <script> tag 載入，造成 classic
    script 跨檔 global lexical record 衝突（W1-117 的 `let Logger` 與其他兩檔的
    `var Logger` 在同一 page 重複宣告 → parse-time SyntaxError）。

    現改由 popup.js require 三檔，esbuild 在 build 階段自動 bundle 進 popup.js
    IIFE，每檔 closure scope 獨立，徹底消除衝突。三檔的 window.Popup* 顯式注入
    保留，使 popup.js typeof 檢查可命中。

    popup-ui-components.js 維持獨立 <script> tag（無 Logger/ErrorCodes 跨檔宣告，
    不在本次重構範圍）。
  -->
  <script src="popup-ui-components.js"></script>
  <script src="popup.js"></script>
</body>
</html>
